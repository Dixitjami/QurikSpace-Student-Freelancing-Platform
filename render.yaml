services:
  - type: web
    name: qurikspace-student-freelancing-platform
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: qurikspace-student-freelancing-platform.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://qurikspace-student-freelancing-platform.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: qurikspace-db
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "1"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: CSRF_COOKIE_SECURE
        value: "1"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "1"
      - key: SECURE_HSTS_PRELOAD
        value: "0"

databases:
  - name: qurikspace-db
    plan: free
    region: singapore
    databaseName: qurikspace
    user: qurikspace
    ipAllowList: []

