{% extends "base.html" %}
{% block content %}

<section class="bg-slate-100 min-h-screen py-16">
    <div class="max-w-3xl mx-auto px-6">
        <form method="post" enctype="multipart/form-data"
              class="bg-white border-2 border-slate-300 rounded-2xl shadow-xl p-10 space-y-8">
            {% csrf_token %}

            <div class="border-b border-slate-200 pb-6">
                <h1 class="text-3xl font-bold text-slate-800">
                    Edit Client Profile
                </h1>
                <p class="text-slate-500 mt-2">
                    Add your business details and profile photo.
                </p>
            </div>

            <div class="bg-slate-50 border border-slate-200 rounded-xl p-6">
                <h2 class="text-lg font-semibold text-slate-800 mb-4">
                    Profile Photo
                </h2>
                <input type="file" name="profile_image"
                       class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-teal-500 focus:outline-none">
            </div>

            <div class="bg-slate-50 border border-slate-200 rounded-xl p-6 space-y-5">
                <div>
                    <label class="block text-slate-700 mb-2">Business Name</label>
                    {{ form.company_name }}
                </div>

                <div>
                    <label class="block text-slate-700 mb-2">Business Type</label>
                    {{ form.business_type }}
                </div>
            </div>

            <div class="pt-4 border-t border-slate-200 text-right">
                <button type="submit"
                        class="bg-teal-600 hover:bg-teal-700 text-white px-10 py-3 rounded-full shadow transition font-medium">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</section>

{% endblock %}
