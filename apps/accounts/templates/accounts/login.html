{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="min-h-screen bg-paper py-12 px-4">
    <div class="max-w-5xl mx-auto">
        <div class="grid overflow-hidden rounded-xl border border-ink/10 bg-white shadow-crisp lg:grid-cols-2">
            <div class="relative min-h-80 bg-ink lg:min-h-full">
                <img src="{% static 'accounts/images/login_pic.jpg' %}" alt="QurikSpace login visual"
                     class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-ink/80 to-transparent p-7 text-white">
                    <p class="text-xs font-bold uppercase tracking-[0.16em] text-white/70">Welcome back</p>
                    <p class="mt-2 text-2xl font-extrabold">Pick up your projects where you left them.</p>
                </div>
            </div>

            <div class="bg-white p-8 md:p-10">
                <h2 class="text-2xl font-extrabold text-ink">Login</h2>
                <p class="text-ink/55 mt-2">Enter your credentials to continue.</p>

                {% if error_message %}
                    <div class="mt-5 rounded-xl border border-rose-200 bg-rose-50 text-rose-700 px-4 py-3 text-sm">
                        {{ error_message }}
                    </div>
                {% endif %}

                <form method="post" class="mt-6 space-y-5">
                    {% csrf_token %}

                    <div>
                        <label for="id_username" class="block text-sm font-semibold text-ink/75 mb-2">Username</label>
                        <input id="id_username" type="text" name="username" required
                               class="w-full rounded-lg border border-ink/15 px-4 py-3 focus:border-sea focus:outline-none focus:ring-2 focus:ring-sea/20">
                    </div>

                    <div>
                        <label for="id_password" class="block text-sm font-semibold text-ink/75 mb-2">Password</label>
                        <input id="id_password" type="password" name="password" required
                               class="w-full rounded-lg border border-ink/15 px-4 py-3 focus:border-sea focus:outline-none focus:ring-2 focus:ring-sea/20">
                    </div>

                    <button type="submit"
                            class="w-full rounded-lg bg-[#E8402A] py-3 font-bold text-white shadow-[0_16px_30px_rgba(232,64,42,0.28)] transition hover:bg-[#F5843A]">
                        Login
                    </button>
                </form>

                <p class="text-sm text-ink/55 mt-6">
                    New to QurikSpace?
                    <a href="{% url 'register' %}" class="font-bold text-[#E8402A] hover:text-[#F5843A] hover:underline">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
